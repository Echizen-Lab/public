name: Sync Metadata to Notion

on:
  push:
    paths:
      - 'metadata.json'  # metadata.jsonが更新された時だけ動く

jobs:
  notion_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<EOF
          import os
          import json
          import requests

          # 1. データの読み込み
          with open('metadata.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          # 2. Notion APIの設定
          url = "https://api.notion.com/v1/pages"
          headers = {
              "Authorization": f"Bearer {os.environ['NOTION_TOKEN']}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }

          # 3. 送信データの組み立て (Notionのプロパティ名と一致させる必要があります)
          payload = {
              "parent": { "database_id": os.environ['NOTION_DATABASE_ID'] },
              "properties": {
                  "Name": { "title": [{ "text": { "content": data.get("title", "Untitled") } }] },
                  "Source Type": { "select": { "name": data.get("source_type") } },
                  "Category": { "select": { "name": data.get("category") } },
                  "Importance": { "select": { "name": data.get("importance") } },
                  "GitHub URL": { "url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}" }
              }
          }

          # 4. 送信実行
          response = requests.post(url, json=payload, headers=headers)
          if response.status_code == 200:
              print("Successfully synced to Notion!")
          else:
              print(f"Error: {response.status_code}, {response.text}")
          EOF
