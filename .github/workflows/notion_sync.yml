name: Hugo to Notion Sync

on:
  push:
    paths:
      - 'content/project/**/index.md' # プロジェクトフォルダの記事が対象

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install PyYAML requests
      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<EOF
          import os, yaml, requests
          from pathlib import Path

          headers = {
              "Authorization": f"Bearer {os.environ['NOTION_TOKEN']}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }
          db_id = os.environ['NOTION_DATABASE_ID']

          # 新規・変更されたMarkdownファイルをスキャン
          for path in Path('content/project').rglob('index.md'):
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
                  if not content.startswith('---'): continue
                  # フロントマター(YAML)を解析
                  data = yaml.safe_load(content.split('---')[1])
                  
                  title = data.get('title', 'Untitled')
                  importance = data.get('importance', '★★★ (High)')
                  
                  # Notionに登録するデータ
                  props = {
                      "Name": {"title": [{"text": {"content": title}}]},
                      "Importance": {"select": {"name": importance}},
                      "File Path": {"rich_text": [{"text": {"content": str(path)}}]}
                  }

                  # 重複チェック（File Pathで検索）
                  query = requests.post(f"https://api.notion.com/v1/databases/{db_id}/query", 
                                      json={"filter": {"property": "File Path", "rich_text": {"equals": str(path)}}}, 
                                      headers=headers).json()
                  
                  if query.get("results"):
                      page_id = query["results"][0]["id"]
                      requests.patch(f"https://api.notion.com/v1/pages/{page_id}", json={"properties": props}, headers=headers)
                      print(f"Updated Notion: {title}")
                  else:
                      requests.post("https://api.notion.com/v1/pages", json={"parent": {"database_id": db_id}, "properties": props}, headers=headers)
                      print(f"Created Notion: {title}")
          EOF
