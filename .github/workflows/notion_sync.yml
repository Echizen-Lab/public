name: Notion Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies and Sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROJECT_DB_ID: ${{ secrets.PROJECT_DB_ID }}
        run: |
          pip install openai pyyaml requests
          python - <<EOF
          import os
          import yaml
          import requests
          from pathlib import Path
          from openai import OpenAI
          
          # 1. 初期設定
          client = OpenAI(api_key=os.environ['OPENAI_API_KEY'])
          headers = {
                "Authorization": f"Bearer {os.environ['NOTION_API_KEY']}",
                "Content-Type": "application/json",
                "Notion-Version": "2022-06-28"
          }
          
          # 2. AIへの命令（プロンプト）
          def ask_ai_for_tags(content, title):
              # 固定したいカテゴリと重要度のリスト
              allowed_categories = ["Attack Framework", "Research", "Tool", "Education"]
              allowed_importance = ["High", "Medium", "Low"]
              
              prompt = f"""
              Project Title: {title}
              Content: {content[:1500]}
              
              Task:
              1. Category: Choose ONE from {allowed_categories}.
              2. Importance: Choose ONE from {allowed_importance}.
              3. Security Field: Provide 1-2 specific technical keywords (e.g., Prompt Injection).
              4. Summary: Write a concise 2-3 sentence summary in Japanese (日本語).

              Return ONLY a JSON object with keys: "category", "importance", "security_field", "summary".
              """
              
              try:
                  response = client.chat.completions.create(
                      model="gpt-4o-mini",
                      messages=[{"role": "system", "content": "You are a professional security analyst. Return JSON only."},
                                {"role": "user", "content": prompt}],
                      response_format={ "type": "json_object" }
                  )
                  import json
                  return json.loads(response.choices[0].message.content)
              except Exception as e:
                  print(f"AI Error: {e}")
                  return {}
          
          # 3. Notionへの同期関数
          def sync_to_notion(title, db_id, file_path, extra_props):
              query_url = f"https://api.notion.com/v1/databases/{db_id}/query"
              # すでに同じファイルパスのページがあるか検索
              res = requests.post(query_url, headers=headers, json={
                  "filter": {"property": "File Path", "rich_text": {"equals": file_path}}
              })
              data = res.json()
              
              props = {"Name": {"title": [{"text": {"content": title}}]}}
              props.update(extra_props)
          
              if data.get("results"):
                  # 既存ページの更新
                  page_id = data["results"][0]["id"]
                  patch_res = requests.patch(f"https://api.notion.com/v1/pages/{page_id}", headers=headers, json={"properties": props})
                  if patch_res.status_code == 200:
                      print(f"✅ Updated: {title}")
