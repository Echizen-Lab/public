name: Notion Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai pyyaml requests

      - name: Sync to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROJECT_DB_ID: ${{ secrets.PROJECT_DB_ID }}
        run: |
          python - <<EOF
          import os, yaml, requests, json
          from pathlib import Path
          from openai import OpenAI
          
          client = OpenAI(api_key=os.environ['OPENAI_API_KEY'])
          headers = {
              "Authorization": f"Bearer {os.environ['NOTION_API_KEY']}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }
          
          def ask_ai(content, title):
              cat_list = ["Attack Framework", "Research", "Tool", "Education"]
              imp_list = ["High", "Medium", "Low"]
              prompt = f"Title: {title}. Content: {content[:1000]}. Task: Select category from {cat_list}, importance from {imp_list}. Provide 1-2 keywords for security_field. Write 2-3 sentences summary in Japanese. Return JSON only."
              try:
                  res = client.chat.completions.create(
                      model="gpt-4o-mini",
                      messages=[
                          {"role": "system", "content": "You are a security analyst. Return JSON: {category, importance, security_field, summary}"},
                          {"role": "user", "content": prompt}
                      ],
                      response_format={ "type": "json_object" }
                  )
                  return json.loads(res.choices[0].message.content)
              except Exception as e:
                  print(f"AI Error: {e}")
                  return {}
          
          def sync(title, db_id, file_path, props):
              # デバッグ：Notion側のプロパティ名を表示
              db_info = requests.get(f"https://api.notion.com/v1/databases/{db_id}", headers=headers).json()
              if 'properties' in db_info:
                  print(f"DEBUG: Notion DB Properties: {list(db_info['properties'].keys())}")
              
              url = f"https://api.notion.com/v1/databases/{db_id}/query"
              query = requests.post(url, headers=headers, json={"filter": {"property": "File Path", "rich_text": {"equals": file_path}}}).json()
              
              payload = {"properties": {"Name": {"title": [{"text": {"content": title}}]}, **props}}
              
              if query.get("results"):
                  page_id = query['results'][0]['id']
                  requests.patch(f"https://api.notion.com/v1/pages/{page_id}", headers=headers, json=payload)
                  print(f"✅ Updated: {title}")
              else:
                  print(f"⚠️ No match for {file_path}. Creating new page...")
                  requests.post("https://api.notion.com/v1/pages", headers=headers, json={"parent": {"database_id": db_id}, **payload})
          
          db_id = os.environ['PROJECT_DB_ID']
          project_path = Path('content/projects')
          for path in project_path.rglob('*.md'):
              if path.name.startswith('_'): continue
              with open(path, 'r', encoding='utf-8') as f:
                  raw = f.read()
                  if not raw.startswith('---'): continue
                  parts = raw.split('---')
                  fm = yaml.safe_load(parts[1]) if len(parts) > 1 else {}
                  body = parts[2] if len(parts) > 2 else ""
                  title = fm.get('title') or path.stem
                  
                  ai = ask_ai(body, title)
                  p = {
                      "Category": {"select": {"name": ai.get('category', 'Research')}},
                      "Importance": {"select": {"name": ai.get('importance', 'Medium')}},
                      "Security Field": {"multi_select": [{"name": str(t)} for t in ai.get('security_field', ['General'])]},
                      "Summary": {"rich_text": [{"text": {"content": str(ai.get('summary', 'No summary.'))}}]},
                      "File Path": {"rich_text": [{"text": {"content": str(path)}}]}
                  }
                  sync(title, db_id, str(path), p)
          EOF
