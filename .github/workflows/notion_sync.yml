name: Notion Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai pyyaml requests
        
      - name: Sync to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROJECT_DB_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<EOF
          import os, yaml, requests, json
          from pathlib import Path
          from openai import OpenAI
          
          client = OpenAI(api_key=os.environ['OPENAI_API_KEY'])
          headers = {
              "Authorization": f"Bearer {os.environ.get('NOTION_API_KEY', '')}",
              "Content-Type": "application/json",
              "Notion-Version": "2022-06-28"
          }
          
          def sync(title, db_id, file_path, props):
              # --- 1. 検索フェーズ ---
              url = f"https://api.notion.com/v1/databases/{db_id}/query"
              query_res = requests.post(url, headers=headers, json={"filter": {"property": "File Path", "rich_text": {"equals": file_path}}})
              
              if query_res.status_code != 200:
                  print(f"❌ [QUERY ERROR] Status: {query_res.status_code}")
                  print(f"Response: {query_res.text}")
                  return

              data = query_res.json()
              payload = {"properties": {"Name": {"title": [{"text": {"content": title}}]}, **props}}
              
              if data.get("results"):
                  # --- 2. 更新フェーズ ---
                  page_id = data['results'][0]['id']
                  patch_res = requests.patch(f"https://api.notion.com/v1/pages/{page_id}", headers=headers, json=payload)
                  if patch_res.status_code == 200:
                      print(f"✅ [SUCCESS] Updated: {title}")
                  else:
                      print(f"❌ [UPDATE FAILED] Status: {patch_res.status_code}")
                      print(f"Response: {patch_res.text}")
              else:
                  # --- 3. 新規作成フェーズ ---
                  print(f"⚠️ No match for {file_path}. Creating new page...")
                  create_res = requests.post("https://api.notion.com/v1/pages", headers=headers, json={"parent": {"database_id": db_id}, **payload})
                  if create_res.status_code == 200:
                      print(f"✅ [SUCCESS] Created: {title}")
                  else:
                      print(f"❌ [CREATE FAILED] Status: {create_res.status_code}")
                      print(f"Response: {create_res.text}")

          db_id = os.environ['PROJECT_DB_ID']
          for path in Path('content/projects').rglob('*.md'):
              if path.name.startswith('_'): continue
              with open(path, 'r', encoding='utf-8') as f:
                  raw = f.read()
                  if not raw.startswith('---'): continue
                  parts = raw.split('---')
                  fm = yaml.safe_load(parts[1]) if len(parts) > 1 else {}
                  body = parts[2] if len(parts) > 2 else ""
                  title = fm.get('title') or path.stem
                  
                  # AI処理（簡易化してエラー防止）
                  prompt = f"Summarize {title} in 2 Japanese sentences. Return JSON: {{'summary': '...'}}"
                  ai_res = client.chat.completions.create(
                      model="gpt-4o-mini",
                      messages=[{"role": "user", "content": prompt}],
                      response_format={ "type": "json_object" }
                  )
                  ai = json.loads(ai_res.choices[0].message.content)

                  p = {
                      "Category": {"select": {"name": ai.get('category', 'Research')}},
                      "Importance": {"select": {"name": ai.get('importance', 'Medium')}},
                      "Security Field": {"multi_select": [{"name": str(t)} for t in ai.get('security_field', ['General'])]},
                      "Source Type": {"select": {"name": "GitHub"}}, # 自動でGitHubと入力
                      "Repo Type": {"multi_select": [{"name": "Public"}]}, # 必要に応じて変更
                      "Summary": {"rich_text": [{"text": {"content": str(ai.get('summary', 'No summary.'))}}]},
                      "File Path": {"rich_text": [{"text": {"content": str(path)}}]},
                      "GitHub URL": {"url": f"https://github.com/${{ github.repository }}/blob/main/{path}"},
                      "Target Model": {"select": {"name": "General"}},
                      # date プロパティが必要な場合は以下を有効に（日付形式が厳格なため注意）
                      "date": {"date": {"start": "2024-01-01"}} 
                  }
                  sync(title, db_id, str(path), p)

          EOF
