import os
import json
import requests

changed_files = os.environ.get('ALL_CHANGED_FILES', '').split()

# Notion API 基本設定
headers = {
    "Authorization": f"Bearer {os.environ['NOTION_TOKEN']}",
    "Content-Type": "application/json",
    "Notion-Version": "2022-06-28"
}
db_id = os.environ['NOTION_DATABASE_ID']

for file_path in changed_files:
    print(f"--- Processing: {file_path} ---")
    
    with open(file_path, 'r', encoding='utf-8') as f:
        data = json.load(f)

    folder_path = os.path.dirname(file_path)
    full_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/tree/main/{folder_path}"

    # 1. 既存のページがあるか検索 (File Path プロパティで一致を確認)
    query_url = f"https://api.notion.com/v1/databases/{db_id}/query"
    query_payload = {
        "filter": {
            "property": "File Path",
            "rich_text": { "equals": file_path }
        }
    }
    query_res = requests.post(query_url, json=query_payload, headers=headers)
    results = query_res.json().get("results", [])

    # 2. 送信するプロパティの組み立て
    properties = {
        "Name": { "title": [{ "text": { "content": data.get("title", "Untitled") } }] },
        "Source Type": { "select": { "name": data.get("source_type") } },
        "Category": { "select": { "name": data.get("category") } },
        "Importance": { "select": { "name": data.get("importance") } },
        "GitHub URL": { "url": full_url },
        "File Path": { "rich_text": [{ "text": { "content": file_path } }] } # 検索キーとして保存
    }

    if results:
        # 更新 (PATCH)
        page_id = results[0]["id"]
        update_url = f"https://api.notion.com/v1/pages/{page_id}"
        response = requests.patch(update_url, json={"properties": properties}, headers=headers)
        action = "Updated"
    else:
        # 新規作成 (POST)
        create_url = "https://api.notion.com/v1/pages"
        payload = {
            "parent": { "database_id": db_id },
            "properties": properties
        }
        response = requests.post(create_url, json=payload, headers=headers)
        action = "Created"

    if response.status_code == 200:
        print(f"Successfully {action} {file_path} in Notion!")
    else:
        print(f"Error: {response.status_code}, {response.text}")
