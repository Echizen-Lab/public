name: Hugo to Notion Sync

on:
  push:
    paths:
      - 'content/projects/*/index*.md'
      - 'data/authors/*.yaml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install PyYAML requests
      - name: Run sync script
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # これを追加！
          USER_DB_ID: ${{ secrets.USER_DB_ID }}
          PROJECT_DB_ID: ${{ secrets.PROJECT_DB_ID }}
        run: |
          pip install openai pyyaml requests
          python - <<EOF
          import os
          import yaml
          import requests
          from pathlib import Path
          from openai import OpenAI

          client = OpenAI(api_key=os.environ['OPENAI_API_KEY'])
          headers = {
                "Authorization": f"Bearer {os.environ['NOTION_API_KEY']}", # ここが *** になっているとエラーになります
                "Content-Type": "application/json",
                "Notion-Version": "2022-06-28"
            }

          # --- 1. AIへの命令（プロンプト）の強化 ---
          def ask_ai_for_tags(content, title):
              # ここに使用したい固定タグのリストを定義します
              allowed_categories = ["Attack Framework", "Research", "Tool", "Education"]
              allowed_importance = ["High", "Medium", "Low"]
              
              prompt = f"""
              Project Title: {title}
              Content: {content[:1500]}

              Task:
              1. Category: Choose ONE from {allowed_categories}.
              2. Importance: Choose ONE from {allowed_importance}.
              3. Security Field: Provide 1-3 specific keywords (e.g., Prompt Injection, Jailbreaking).
              4. Summary: Write a concise 2-3 sentence summary in Japanese.

              Return ONLY a JSON object:
              {{
                "category": "Selected Category",
                "importance": "Selected Importance",
                "security_field": ["Keyword1", "Keyword2"],
                "summary": "日本語の要約文"
              }}
              """
              try:
                  response = client.chat.completions.create(
                      model="gpt-4o-mini",
                      messages=[{"role": "system", "content": "You are a professional security analyst. Return JSON only."},
                                {"role": "user", "content": prompt}],
                      response_format={ "type": "json_object" }
                  )
                  import json
                  return json.loads(response.choices[0].message.content)
              except Exception as e:
                  print(f"AI Error: {e}")
                  return {}

          def sync_to_notion(title, db_id, file_path, extra_props):
              query_url = f"https://api.notion.com/v1/databases/{db_id}/query"
              res = requests.post(query_url, headers=headers, json={"filter": {"property": "File Path", "rich_text": {"equals": file_path}}})
              data = res.json()
              
              props = {"Name": {"title": [{"text": {"content": title}}]}}
              props.update(extra_props)

              if data.get("results"):
                  page_id = data["results"][0]["id"]
                  requests.patch(f"https://api.notion.com/v1/pages/{page_id}", headers=headers, json={"properties": props})
                  print(f"Updated: {title} (AI-tagged)")
              else:
                  requests.post("https://api.notion.com/v1/pages", headers=headers, json={"parent": {"database_id": db_id}, "properties": props})
                  print(f"Created: {title} (AI-tagged)")

          # プロジェクト同期実行
          proj_db = os.environ['PROJECT_DB_ID']
          for path in Path('content/projects').rglob('*.md'):
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
                  if not content.startswith('---'): continue
                  parts = content.split('---')
                  data = yaml.safe_load(parts[1]) if len(parts) > 1 else {}
                  body = parts[2] if len(parts) > 2 else ""
                  
                  title = data.get('title') or path.parent.name
                  # AIに相談
                  ai_decision = ask_ai_for_tags(body, title)

                  extra_props = {
                      "Category": {"select": {"name": ai_decision.get('category', 'Research')}},
                      "Importance": {"select": {"name": ai_decision.get('importance', 'Medium')}},
                      "Security Field": {"multi_select": [{"name": tag} for tag in ai_decision.get('security_field', ['General'])]},
                      "Summary": {"rich_text": [{"text": {"content": ai_decision.get('summary', '')}}]}, # 要約を追加
                      "File Path": {"rich_text": [{"text": {"content": str(path)}}]}
                  }
                  sync_to_notion(title, proj_db, str(path), extra_props)
          EOF
